name: vaadaka
description: "Vaadaka — Rent anything near you"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Fonts & icons
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

  # Image handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Formatting
  intl: ^0.20.1

  # Razorpay
  razorpay_flutter: ^1.4.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # URL launching
  url_launcher: ^6.3.1

  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#D20000"
  image: assets/images/app_icon.png
  fullscreen: true
  android_12:
    color: "#D20000"
    image: assets/images/app_icon.png
    fullscreen: true
